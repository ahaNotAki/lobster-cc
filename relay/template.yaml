AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  WeCom Relay — Lambda + API Gateway + DynamoDB for proxying WeCom callbacks
  to a local Claude Code Remote Control server via polling.

# ─── Parameters ───────────────────────────────────────────────────────────────

Parameters:
  WeComToken:
    Type: String
    NoEcho: true
    Description: Legacy single-agent WeCom verification token (used as fallback)

  WeComAesKey:
    Type: String
    NoEcho: true
    Description: Legacy single-agent WeCom AES encoding key (used as fallback)

  AgentConfigs:
    Type: String
    Default: ''
    Description: >
      Multi-agent JSON config, e.g.
      {"1000002":{"token":"...","aes_key":"..."},"1000003":{"token":"...","aes_key":"..."}}

  TtlDays:
    Type: Number
    Default: 7
    Description: Number of days to retain messages in DynamoDB before TTL expiry

# ─── Globals ──────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: python3.11
    MemorySize: 128
    Timeout: 30
    Architectures:
      - x86_64

# ─── Resources ────────────────────────────────────────────────────────────────

Resources:

  # --- DynamoDB Table ---
  RelayMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: wecom_relay_messages
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: msg_id
          AttributeType: S
        - AttributeName: gsi_pk
          AttributeType: S
        - AttributeName: seq
          AttributeType: N
      KeySchema:
        - AttributeName: msg_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: seq-index
          KeySchema:
            - AttributeName: gsi_pk
              KeyType: HASH
            - AttributeName: seq
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- Lambda Function ---
  WeComRelayFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wecom-relay
      Handler: lambda_function.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          TABLE_NAME: !Ref RelayMessagesTable
          WECOM_TOKEN: !Ref WeComToken
          WECOM_AES_KEY: !Ref WeComAesKey
          TTL_DAYS: !Ref TtlDays
          AGENT_CONFIGS: !Ref AgentConfigs
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RelayMessagesTable
      Events:
        CallbackGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref RelayHttpApi
            Path: /callback
            Method: GET
        CallbackPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref RelayHttpApi
            Path: /callback
            Method: POST
        CallbackAgentGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref RelayHttpApi
            Path: /callback/{agent_id}
            Method: GET
        CallbackAgentPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref RelayHttpApi
            Path: /callback/{agent_id}
            Method: POST
        MessagesFetch:
          Type: HttpApi
          Properties:
            ApiId: !Ref RelayHttpApi
            Path: /messages/fetch
            Method: POST

  # --- HTTP API Gateway ---
  RelayHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  ApiEndpoint:
    Description: Base URL for WeCom callback registration and relay polling
    Value: !Sub "https://${RelayHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt WeComRelayFunction.Arn

  TableName:
    Description: DynamoDB table name
    Value: !Ref RelayMessagesTable
