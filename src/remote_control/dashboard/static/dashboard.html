<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦞 Lobster Control</title>
<style>
:root{--bg:#060b1e;--card:rgba(255,255,255,0.04);--card-hover:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.06);--text:#d4d4d8;--dim:#6b7280;--accent:#60a5fa;--green:#4ade80;--red:#f87171;--orange:#fb923c;--purple:#c084fc;--cyan:#22d3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh}

/* AQUARIUM */
.aquarium{position:relative;width:100%;height:400px;background:linear-gradient(180deg,#040918 0%,#0a1628 30%,#0d2240 60%,#12325a 85%,#1a4570 100%);overflow:hidden}
.aquarium::before{content:'';position:absolute;top:0;left:20%;width:60%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(96,165,250,0.03) 0%,transparent 70%);pointer-events:none}
.ray{position:absolute;top:-20px;width:2px;height:200px;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent);transform:rotate(15deg);animation:rayShimmer 8s ease-in-out infinite}
@keyframes rayShimmer{0%,100%{opacity:0.3}50%{opacity:0.8}}
.sand{position:absolute;bottom:0;width:100%;height:55px;background:linear-gradient(180deg,#3d2e1a,#2e2214);border-radius:80% 80% 0 0/25px 25px 0 0}
.weed{position:absolute;bottom:45px;width:6px;background:linear-gradient(180deg,#34d399,#065f46);border-radius:3px 3px 0 0;animation:sway 3s ease-in-out infinite;transform-origin:bottom;opacity:0.7}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.2),rgba(255,255,255,0.02));animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.4}100%{transform:translateY(-420px) scale(1.5);opacity:0}}
.coral{position:absolute;bottom:48px;font-size:20px;opacity:0.5}
.ws-area{position:absolute;bottom:50px;left:0;right:0;display:flex;justify-content:space-evenly;padding:0 5%}
.workstation{display:flex;flex-direction:column;align-items:center;transition:all 0.5s;filter:brightness(0.5) saturate(0.7)}
.workstation.active{filter:brightness(1.3) saturate(1);transform:translateY(-2px)}
.ws-icon{font-size:26px;line-height:1;margin-bottom:2px;transition:transform 0.3s}
.workstation.active .ws-icon{transform:scale(1.15)}
.ws-desk{width:52px;height:22px;background:linear-gradient(180deg,rgba(120,90,60,0.5),rgba(80,60,40,0.3));border-radius:4px 4px 1px 1px;border:1px solid rgba(140,110,70,0.2);position:relative}
.ws-desk::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:6px;height:7px;background:rgba(80,60,40,0.3);border-radius:0 0 1px 1px}
.workstation.active .ws-desk{background:linear-gradient(180deg,rgba(180,140,80,0.8),rgba(140,100,60,0.6));box-shadow:0 0 18px rgba(255,200,100,0.2);border-color:rgba(255,200,120,0.4)}
.ws-label{font-size:9px;color:rgba(255,255,255,0.55);letter-spacing:1px;margin-top:9px;text-transform:uppercase;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)}
.workstation.active .ws-label{color:#fff;text-shadow:0 0 8px rgba(255,200,100,0.5)}

/* LOBSTER — one per agent */
.lobster-wrap{position:absolute;z-index:10;transition:left 1.2s cubic-bezier(0.4,0,0.2,1),bottom 0.8s cubic-bezier(0.4,0,0.2,1);transform:translateX(-50%);bottom:210px}
.lobster-wrap.flip{transform:translateX(-50%) scaleX(-1)}
.lobster-wrap.flip .speech{transform:scaleX(-1)}
.lobster-wrap.flip .lobster-name{transform:scaleX(-1)}
.lobster-wrap.working,.lobster-wrap.error{bottom:76px}
.lobster-wrap.done{bottom:150px}
.lobster{font-size:44px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
.lobster-wrap.idle .lobster{animation:swim 3s ease-in-out infinite}
.lobster-wrap.working .lobster{animation:work 0.5s ease-in-out infinite}
.lobster-wrap.error .lobster{animation:shake 0.2s infinite;filter:drop-shadow(0 0 6px rgba(248,113,113,0.5))}
.lobster-wrap.done .lobster{animation:celebrate 0.5s ease-in-out infinite}
@keyframes swim{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes work{0%,100%{transform:rotate(0)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes celebrate{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.05)}}
.lobster-name{text-align:center;font-size:10px;color:rgba(255,255,255,0.9);margin-top:2px;letter-spacing:0.5px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.speech{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:4px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:5px 12px;font-size:11px;color:#fff;white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.4s;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.speech.show{opacity:1}
.speech::after{content:'';position:absolute;top:100%;left:50%;margin-left:-4px;border:4px solid transparent;border-top-color:rgba(0,0,0,0.6)}

/* PANELS */
.panel{max-width:1000px;margin:0 auto;padding:16px 12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:background 0.2s}
.card:hover{background:var(--card-hover)}
.card h2{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:6px}
.agent-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:0.3px}
.agent-badge.a0{background:rgba(96,165,250,0.2);color:var(--accent)}
.agent-badge.a1{background:rgba(192,132,252,0.2);color:var(--purple)}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.running{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite}
.dot.idle{background:var(--dim)}
.dot.error{background:var(--red)}
.dot.done{background:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600}
.tag.running{background:rgba(74,222,128,0.15);color:var(--green)}
.tag.completed{background:rgba(96,165,250,0.15);color:var(--accent)}
.tag.failed{background:rgba(248,113,113,0.15);color:var(--red)}
.tag.cancelled{background:rgba(251,146,60,0.15);color:var(--orange)}
.tag.queued{background:rgba(255,255,255,0.06);color:var(--dim)}
.mono{font-family:'SF Mono','JetBrains Mono','Consolas',monospace;font-size:13px}
.dim{color:var(--dim);font-size:13px}
.elapsed{font-size:24px;font-weight:300;font-family:'SF Mono',monospace;color:var(--accent)}
.stream-box{background:rgba(0,0,0,0.25);border-radius:6px;padding:10px 12px;font-family:'SF Mono',monospace;font-size:12px;line-height:1.7;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px;border:1px solid rgba(255,255,255,0.05)}
.stream-box.output{color:var(--green)}
.stream-box.thinking{color:var(--purple);background:rgba(30,15,40,0.4)}
.task-list,.cron-list{list-style:none}
.task-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;min-height:44px;transition:background 0.15s}
.task-item:hover{background:rgba(255,255,255,0.03);border-radius:4px}
.task-item:active{background:rgba(255,255,255,0.05)}
.task-msg{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-dur{color:var(--dim);font-size:12px;white-space:nowrap}
.task-id{font-family:'SF Mono',monospace;font-size:11px;color:var(--dim);min-width:50px}
.task-status-emoji{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.task-agent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.task-detail{display:none;padding:10px 14px;margin:-1px 0 4px 0;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:0 0 8px 8px;font-size:13px;line-height:1.7;animation:slideDown 0.2s ease-out}
.task-detail.show{display:block}
.task-detail .td-label{color:var(--dim);font-size:12px;margin-right:6px}
.task-detail .td-row{margin-bottom:4px;word-break:break-all}
.task-detail .td-id{font-family:'SF Mono',monospace;font-size:11px;color:var(--dim)}
.task-detail .td-output{background:rgba(0,0,0,0.3);border-radius:6px;padding:8px 10px;font-family:'SF Mono',monospace;font-size:12px;line-height:1.6;max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:var(--green);margin:6px 0}
.task-detail .td-output.full{max-height:400px}
.task-detail .td-error{color:var(--red)}
.task-detail .td-btn{display:inline-block;padding:4px 10px;border-radius:4px;background:rgba(96,165,250,0.15);color:var(--accent);font-size:12px;cursor:pointer;border:none;margin-top:4px}
.task-detail .td-btn:hover{background:rgba(96,165,250,0.25)}
/* Timeline swimlane */
.tl-lane{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.tl-lane:last-child{border-bottom:none}
.tl-lane-label{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tl-axis{position:relative;height:44px;margin:0 0 2px 0}
.tl-track{position:absolute;top:20px;left:0;right:0;height:2px;background:rgba(255,255,255,0.08);border-radius:1px}
.tl-tick{position:absolute;top:0;font-size:10px;color:var(--dim);transform:translateX(-50%);font-family:'SF Mono',monospace;user-select:none}
.tl-tick::after{content:'';position:absolute;left:50%;bottom:-4px;width:1px;height:4px;background:rgba(255,255,255,0.1)}
.tl-dot{position:absolute;top:15px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;z-index:2}
.tl-dot:hover{transform:translateX(-50%) scale(1.4);z-index:5}
.tl-dot.daily{background:var(--cyan)}
.tl-dot.weekday{background:var(--accent)}
.tl-dot.weekly{background:var(--orange);border-radius:2px;transform:translateX(-50%) rotate(45deg)}
.tl-dot.weekly:hover{transform:translateX(-50%) rotate(45deg) scale(1.3)}
.tl-dot.disabled{opacity:0.3}
.tl-range{position:absolute;top:18px;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--cyan));opacity:0.6;z-index:1}
.tl-range-dot{position:absolute;top:15px;width:12px;height:12px;border-radius:50%;background:var(--green);transform:translateX(-50%);cursor:pointer;transition:transform 0.15s;z-index:2}
.tl-range-dot:hover{transform:translateX(-50%) scale(1.4)}
.tl-range-dot.disabled{opacity:0.3}
.tl-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 10px;font-size:11px;color:#fff;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
.tl-dot:hover .tl-tooltip,.tl-range-dot:hover .tl-tooltip{opacity:1}
.tl-dot-active{transform:translateX(-50%) scale(1.5) !important;box-shadow:0 0 8px var(--cyan) !important}
.tl-label{position:absolute;top:30px;font-size:9px;color:var(--dim);transform:translateX(-50%);white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;text-align:center}
/* Prompt expand (reused from old cron-item) */
.sched-detail{display:none;margin:6px 0 0 0;padding:10px 12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:6px;font-family:'SF Mono','JetBrains Mono',monospace;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:350px;overflow-y:auto}
.sched-detail.show{display:block;animation:slideDown 0.2s ease-out}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:350px}}
.tl-legend{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--dim)}
.tl-legend-item{display:flex;align-items:center;gap:4px}
.tl-legend-dot{width:8px;height:8px;border-radius:50%}
.tl-legend-dot.daily{background:var(--cyan)}
.tl-legend-dot.weekday{background:var(--accent)}
.tl-legend-dot.weekly{background:var(--orange);border-radius:1px;transform:rotate(45deg)}
.tl-legend-dot.periodic{background:var(--green)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px 16px;font-size:13px}
.info-grid .label{color:var(--dim)}
.info-grid .value{font-family:'SF Mono',monospace}
.ctx-bar-wrap{margin-bottom:12px}
.ctx-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.ctx-bar-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.ctx-bar-fill{height:100%;border-radius:3px;transition:width 0.5s}

/* TAB BAR */
.tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:thin;border-bottom:1px solid var(--border);margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:600;color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s,border-color 0.2s;display:flex;align-items:center;gap:5px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tab-agent-sep{display:flex;align-items:center;gap:4px;padding:8px 10px;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;border-left:1px solid var(--border);margin-left:4px}
.tab-content{min-height:100px}
.tab-content .tab-loading{text-align:center;padding:30px;color:var(--dim);font-size:14px}
.tab-content .tab-error{padding:16px;color:var(--red);font-size:14px}
.tab-refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--dim);font-size:12px;cursor:pointer;transition:color 0.2s,border-color 0.2s;margin-bottom:10px}
.tab-refresh-btn:hover{color:var(--accent);border-color:var(--accent)}
/* Tab table */
.tab-table{width:100%;border-collapse:collapse;font-size:13px}
.tab-table th{text-align:left;padding:6px 10px;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
.tab-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.tab-table tr:hover td{background:rgba(255,255,255,0.02)}
/* Tab key-value */
.tab-kv{font-size:13px}
.tab-kv-row{display:flex;gap:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.tab-kv-key{color:var(--dim);min-width:120px;font-weight:600}
.tab-kv-val{color:var(--text);font-family:'SF Mono',monospace;word-break:break-all}
.tab-kv-nested{margin-left:16px;border-left:2px solid var(--border);padding-left:10px;margin-top:4px}
/* Tab chart */
.tab-chart-wrap{position:relative;width:100%;height:300px}
.tab-chart-wrap canvas{width:100%!important;height:100%!important}

@media(max-width:600px){.aquarium{height:300px}.lobster{font-size:34px}.ws-icon{font-size:20px}.ws-desk{width:38px;height:18px}}
</style>
</head>
<body>
<div class="aquarium" id="aquarium">
  <div class="sand"></div>
  <div class="ws-area" id="wsArea"></div>
</div>

<div class="panel">
  <!-- Tab navigation -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">&#127968; Home</button>
  </div>

  <!-- Tab content area (shown when a non-home tab is selected) -->
  <div id="tabContent" style="display:none"></div>

  <!-- Home content (default view) -->
  <div id="homeContent">
  <!-- Agent panels (dynamically generated) -->
  <div id="agentPanels"></div>

  <!-- Model Info -->
  <div class="card" id="modelCard">
    <h2>🤖 Model</h2>
    <div id="modelContent"></div>
  </div>

  <!-- Scheduled Tasks Timeline -->
  <div class="card">
    <h2>⏰ Scheduled Tasks</h2>
    <div id="schedTimeline"></div>
    <div id="schedDetail"></div>
  </div>

  <!-- Recent Tasks -->
  <div class="card">
    <h2>📋 Recent Tasks</h2>
    <ul class="task-list" id="taskList"></ul>
  </div>
  </div><!-- /homeContent -->
</div>

<script>
const AGENT_COLORS = ['a0','a1','a2','a3'];
const AGENT_DOT_COLORS = ['#60a5fa','#c084fc','#22d3ee','#fb923c'];
let wsPositions={}, wsRendered=false;
let lobsters={}; // agent_name -> {el, pos, dir, state, swimTimer}
const expandedScheds=new Set(); // track which schedule items are expanded
let lastSchedJson=''; // skip re-render when unchanged
const expandedTasks=new Set(); // track which task items are expanded
let lastTaskJson=''; // skip re-render when task data unchanged

function renderWorkstations(wsList){
  if(wsRendered)return;
  const area=document.getElementById('wsArea');
  area.innerHTML='';
  wsList.forEach(ws=>{
    const d=document.createElement('div');d.className='workstation';d.id='ws-'+ws.id;
    d.innerHTML=`<div class="ws-icon">${ws.icon}</div><div class="ws-desk"></div><div class="ws-label">${ws.label}</div>`;
    area.appendChild(d);
  });
  wsRendered=true;
  requestAnimationFrame(()=>{
    const aq=document.getElementById('aquarium'),aqW=aq.offsetWidth;
    wsList.forEach(ws=>{
      const el=document.getElementById('ws-'+ws.id);
      if(el){const r=el.getBoundingClientRect(),ar=aq.getBoundingClientRect();
        wsPositions[ws.id]={el,centerPct:((r.left-ar.left+r.width/2)/aqW)*100};}
    });
  });
}

function ensureLobster(name, idx){
  if(lobsters[name])return lobsters[name];
  const aq=document.getElementById('aquarium');
  const wrap=document.createElement('div');
  wrap.className='lobster-wrap idle';
  const startPos=30+idx*20;
  wrap.style.left=startPos+'%';
  wrap.innerHTML=`<div class="speech"></div><div class="lobster">🦞</div><div class="lobster-name">${name}</div>`;
  aq.appendChild(wrap);
  const state={el:wrap,pos:startPos,dir:idx%2===0?1:-1,state:'idle'};
  lobsters[name]=state;
  // Start swimming
  state.swimTimer=setInterval(()=>{
    if(state.state!=='idle')return;
    if(Math.random()<0.12)state.dir*=-1;
    let n=state.pos+state.dir*(1.5+Math.random()*2);
    n=Math.max(6,Math.min(94,n));
    moveLobster(name,n);
  },2500+idx*500);
  return state;
}

function moveLobster(name,pct){
  const s=lobsters[name];if(!s)return;
  if(pct<s.pos-1)s.el.classList.add('flip');else if(pct>s.pos+1)s.el.classList.remove('flip');
  s.pos=pct;s.el.style.left=pct+'%';
}

function renderAgentPanels(agentsList){
  const container=document.getElementById('agentPanels');
  // Update existing badges with current names
  if(container.children.length>0){
    agentsList.forEach((a,i)=>{
      const badge=container.querySelector(`#agent-card-${i} .agent-badge`);
      if(badge)badge.textContent=a.name;
    });
    return;
  }
  container.innerHTML='';
  const grid=document.createElement('div');grid.className='grid-2';
  agentsList.forEach((a,i)=>{
    grid.innerHTML+=`<div class="card" id="agent-card-${i}">
      <h2><span class="agent-badge ${AGENT_COLORS[i]}">${a.name}</span> Status</h2>
      <div class="status-row">
        <div class="dot idle" id="dot-${i}"></div>
        <span id="label-${i}" class="tag queued">空闲</span>
        <span class="elapsed" id="elapsed-${i}">--:--</span>
      </div>
      <div id="msg-${i}" class="mono" style="margin:8px 0;min-height:16px;font-size:13px;color:var(--text);word-break:break-all;line-height:1.5"></div>
      <div class="dim">PID <span id="pid-${i}" class="mono">-</span> · RAM <span id="rss-${i}" class="mono">-</span></div>
      <div class="stream-box output" id="out-${i}" style="display:none;max-height:200px"></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:4px"><span style="font-size:13px">🧠</span><span class="dim" style="font-size:11px">Thinking</span></div>
      <div class="stream-box thinking" id="think-${i}" style="max-height:120px;min-height:40px">Waiting...</div>
    </div>`;
  });
  container.appendChild(grid);
}

function updateUI(data){
  const agents=data.agents||[data.agent];
  const procs=data.all_processes||[data.process];
  const models=data.all_models||[data.model||{}];
  if(data.workstations)renderWorkstations(data.workstations);
  renderAgentPanels(agents);

  // Clear workstation highlights, then only activate the ones in use
  document.querySelectorAll('.workstation').forEach(w=>w.classList.remove('active'));

  agents.forEach((a,i)=>{
    const state=a.state,name=a.name||'agent'+i;
    const L=ensureLobster(name,i);
    // Per-agent lobster config (emoji + name)
    const agLobster=(data.all_lobsters||[])[i]||data.lobster||{};
    if(agLobster.emoji)L.el.querySelector('.lobster').textContent=agLobster.emoji;
    // Update name in real-time from config
    L.el.querySelector('.lobster-name').textContent=name;
    const ac=state==='idle'?'idle':state==='error'?'error':state==='done'?'done':'working';
    const isFlip=L.el.classList.contains('flip');
    L.el.className='lobster-wrap '+ac;
    if(isFlip)L.el.classList.add('flip');
    L.state=state;

    // Only the WORKING agent moves to a workstation
    if(state!=='idle'&&state!=='done'&&state!=='error'){
      const ws=wsPositions[state]||wsPositions['general'];
      if(ws){ws.el.classList.add('active');moveLobster(name,ws.centerPct+(i*6-3));}
    }else if(state==='done'&&Math.abs(L.pos-50)>15){moveLobster(name,35+i*25);}

    const sp=L.el.querySelector('.speech');
    if(a.task_message&&state!=='idle'){sp.textContent=a.task_message.substring(0,28)+(a.task_message.length>28?'…':'');sp.classList.add('show');}
    else sp.classList.remove('show');

    // Panel updates
    const dot=document.getElementById('dot-'+i);
    if(dot)dot.className='dot '+(state==='idle'?'idle':state==='error'?'error':state==='done'?'done':'running');
    const lb=document.getElementById('label-'+i);
    if(lb){lb.textContent=a.state_label;lb.className='tag '+(state==='idle'?'queued':state==='error'?'failed':state==='done'?'completed':'running');}
    const el=document.getElementById('elapsed-'+i);
    if(el){if(a.elapsed_seconds>0){const m=Math.floor(a.elapsed_seconds/60),s=a.elapsed_seconds%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}else el.textContent='--:--';}
    const mg=document.getElementById('msg-'+i);if(mg)mg.textContent=a.task_message||'';
    const p=procs[i]||{};
    const pe=document.getElementById('pid-'+i);if(pe)pe.textContent=p.pid||'-';
    const re=document.getElementById('rss-'+i);if(re)re.textContent=p.rss_mb?p.rss_mb+'MB':'-';
    const ob=document.getElementById('out-'+i);
    if(ob){if(a.streaming_output){ob.style.display='block';ob.textContent=a.streaming_output;ob.scrollTop=ob.scrollHeight;}else ob.style.display='none';}
    const tb=document.getElementById('think-'+i);
    if(tb){if(a.thinking){tb.textContent=a.thinking;tb.scrollTop=tb.scrollHeight;}else tb.textContent=state==='idle'?'Waiting...':'Thinking...';}
  });

  // Model info — per agent
  const mc=document.getElementById('modelContent');
  mc.innerHTML=models.map((m,i)=>{
    const name=agents[i]?agents[i].name:'Agent';
    const ctxUsed=m.current_context_tokens||0,ctxMax=m.context_window||0;
    const pct=ctxMax>0?Math.min(100,Math.round(ctxUsed/ctxMax*100)):0;
    const barColor=pct>80?'var(--red)':pct>50?'var(--orange)':'var(--green)';
    return `<div style="margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px"><span class="agent-badge ${AGENT_COLORS[i]}">${esc(name)}</span> ${esc(m.model||'—')}</div>
      <div class="ctx-bar-wrap"><div class="ctx-bar-label"><span class="dim">Context</span><span class="mono" style="font-size:12px;color:var(--accent)">${ctxMax?fmtK(ctxUsed)+' / '+fmtK(ctxMax)+' ('+pct+'%)':'—'}</span></div><div class="ctx-bar-track"><div class="ctx-bar-fill" style="width:${pct}%;background:${barColor}"></div></div></div>
      <div class="info-grid"><div><span class="label">In/Out</span></div><div><span class="value">${m.input_tokens?m.input_tokens.toLocaleString():'-'} / ${m.output_tokens?m.output_tokens.toLocaleString():'-'}</span></div><div><span class="label">Cache</span></div><div><span class="value">${m.cache_read_tokens?m.cache_read_tokens.toLocaleString():'-'}</span></div><div><span class="label">Cost</span></div><div><span class="value">${m.total_cost_usd?'$'+m.total_cost_usd.toFixed(4):'-'}</span></div><div><span class="label">CLI</span></div><div><span class="value">${m.claude_code_version||'-'}</span></div></div>
    </div>`;
  }).join('');

  // Scheduled tasks — swimlane timeline
  const allScheds=data.all_schedules||[];
  const schedKey=JSON.stringify(allScheds);
  if(schedKey!==lastSchedJson){
    lastSchedJson=schedKey;
    renderTimeline(agents, allScheds, data.system_crons||[]);
  }

  // Custom tabs
  updateTabBar(data.all_tabs||[], agents, data.agent_names||{});

  // Tasks — compact with expandable details
  const agentNames=data.agent_names||{};
  const multiAgent=Object.keys(agentNames).length>1;
  const taskJson=JSON.stringify(data.recent_tasks||[]);
  if(taskJson!==lastTaskJson){
    lastTaskJson=taskJson;
    renderTaskList(data.recent_tasks||[], agentNames, multiAgent);
  }
}

function fmtDur(s){return s<60?s+'s':Math.floor(s/60)+'m'+(s%60)+'s';}
function fmtK(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':String(n);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function statusEmoji(s){return{completed:'\u2705',failed:'\u274C',cancelled:'\uD83D\uDEAB',running:'\u25B6\uFE0F',queued:'\u23F3'}[s]||s;}
function agentDotIdx(agentId,agentNames){const keys=Object.keys(agentNames);const idx=keys.indexOf(String(agentId));return idx>=0?idx:0;}

function renderTaskList(tasks, agentNames, multiAgent){
  const ul=document.getElementById('taskList');
  ul.innerHTML='';
  tasks.forEach(t=>{
    const dur=t.duration!=null?fmtDur(t.duration):'';
    const dotColor=multiAgent?AGENT_DOT_COLORS[agentDotIdx(t.agent_id,agentNames)]||AGENT_DOT_COLORS[0]:'';
    // Row
    const li=document.createElement('li');
    li.className='task-item';
    li.onclick=()=>toggleTask(t.id);
    let rowHtml='';
    if(multiAgent)rowHtml+=`<span class="task-agent-dot" style="background:${dotColor}"></span>`;
    rowHtml+=`<span class="task-status-emoji">${statusEmoji(t.status)}</span>`;
    rowHtml+=`<span class="task-msg">${esc(t.message)}</span>`;
    rowHtml+=`<span class="task-dur">${dur}</span>`;
    li.innerHTML=rowHtml;
    ul.appendChild(li);
    // Detail panel
    const det=document.createElement('div');
    det.className='task-detail'+(expandedTasks.has(t.id)?' show':'');
    det.id='td-'+t.id;
    det.innerHTML=`<div class="td-row">${esc(t.message)}</div><div class="td-row"><span class="td-id">#${t.id}</span></div><div class="td-row"><span class="td-label">Created:</span>${esc(t.created_at||'')}</div><div class="td-row" id="td-ts-${t.id}"></div><div id="td-out-${t.id}"></div><div id="td-err-${t.id}"></div>`;
    ul.appendChild(det);
    // Restore expanded state: if expanded, fetch full data
    if(expandedTasks.has(t.id)){fetchTaskDetail(t.id);}
  });
}

function toggleTask(tid){
  if(expandedTasks.has(tid)){
    expandedTasks.delete(tid);
    const d=document.getElementById('td-'+tid);
    if(d)d.classList.remove('show');
  }else{
    expandedTasks.add(tid);
    const d=document.getElementById('td-'+tid);
    if(d)d.classList.add('show');
    fetchTaskDetail(tid);
  }
}

async function fetchTaskDetail(tid){
  try{
    const r=await fetch('/api/task/'+tid);
    if(!r.ok)return;
    const d=await r.json();
    // Timestamps
    const tsEl=document.getElementById('td-ts-'+tid);
    if(tsEl){
      let ts='';
      if(d.started_at)ts+=`<span class="td-label">Started:</span>${esc(d.started_at)}<br>`;
      if(d.finished_at)ts+=`<span class="td-label">Finished:</span>${esc(d.finished_at)}<br>`;
      if(d.duration!=null)ts+=`<span class="td-label">Duration:</span>${fmtDur(d.duration)}`;
      tsEl.innerHTML=ts;
    }
    // Output
    const outEl=document.getElementById('td-out-'+tid);
    if(outEl&&d.output){
      const preview=d.output.substring(0,500);
      const hasMore=d.output.length>500;
      outEl.innerHTML=`<div class="td-output" id="td-outbox-${tid}">${esc(preview)}${hasMore?'...':''}</div>${hasMore?`<button class="td-btn" onclick="event.stopPropagation();showFullOutput('${tid}')">View Full</button>`:''}`;
      outEl._fullOutput=d.output;
    }
    // Error
    const errEl=document.getElementById('td-err-'+tid);
    if(errEl&&d.error){errEl.innerHTML=`<div class="td-row td-error"><span class="td-label">Error:</span>${esc(d.error)}</div>`;}
  }catch(e){}
}

function showFullOutput(tid){
  const outEl=document.getElementById('td-out-'+tid);
  if(!outEl||!outEl._fullOutput)return;
  const box=document.getElementById('td-outbox-'+tid);
  if(box){box.textContent=outEl._fullOutput;box.classList.add('full');}
  const btn=outEl.querySelector('.td-btn');if(btn)btn.remove();
}

// Store schedule data for click lookup (avoids escaping issues in onclick attrs)
let schedDataMap={};

function toggleSched(uid){
  const det=document.getElementById('schedDetail');
  if(expandedScheds.has(uid)){
    expandedScheds.delete(uid);
    det.innerHTML='';
    // Remove active highlight
    document.querySelectorAll('.tl-dot-active').forEach(e=>e.classList.remove('tl-dot-active'));
    return;
  }
  expandedScheds.clear();
  expandedScheds.add(uid);
  const d=schedDataMap[uid];
  if(d){
    det.innerHTML=`<div class="sched-detail show"><div style="font-size:13px;font-weight:600;color:var(--cyan);margin-bottom:6px">${esc(d.name)} <span style="font-weight:400;color:var(--dim);font-size:11px">${esc(d.schedHuman)}</span></div>${esc(d.prompt||'(no prompt)')}</div>`;
  }
  // Highlight the clicked dot
  document.querySelectorAll('.tl-dot-active').forEach(e=>e.classList.remove('tl-dot-active'));
  const dot=document.querySelector(`[data-uid="${uid}"]`);
  if(dot)dot.classList.add('tl-dot-active');
}

function renderTimeline(agents, allScheds, systemCrons){
  const container=document.getElementById('schedTimeline');
  const det=document.getElementById('schedDetail');
  const TL_START=7, TL_END=23;
  const hourToPercent=h=>{
    const clamped=Math.max(TL_START,Math.min(TL_END,h));
    return ((clamped-TL_START)/(TL_END-TL_START))*100;
  };

  let hasData=allScheds.some(s=>s.length>0);
  if(!hasData){
    if(systemCrons.length){
      container.innerHTML=systemCrons.map(c=>`<div style="padding:4px 0;font-size:13px"><span style="color:var(--cyan);font-weight:600;margin-right:8px">${esc(c.schedule)}</span><span>${esc(c.name)}</span></div>`).join('');
    } else {
      container.innerHTML='<div class="dim" style="padding:8px 0">No scheduled tasks</div>';
    }
    det.innerHTML='';
    return;
  }

  // Store data for click handler
  schedDataMap={};

  // Tick marks (shared)
  let ticksHtml='';
  for(let h=TL_START;h<=TL_END;h+=2){
    ticksHtml+=`<div class="tl-tick" style="left:${hourToPercent(h)}%">${String(h).padStart(2,'0')}</div>`;
  }

  let html='';
  agents.forEach((a,i)=>{
    const scheds=allScheds[i]||[];
    if(!scheds.length)return;
    const aName=a.name||'agent'+i;
    const aBadgeCls=AGENT_COLORS[i]||'a0';

    // Sort by start_hour for label collision avoidance
    const sorted=[...scheds.map((s,si)=>({...s,si}))].sort((a,b)=>(a.start_hour||0)-(b.start_hour||0));

    let dotsHtml='';
    let lastLabelEnd=-999; // track label right edge to avoid overlap
    sorted.forEach(s=>{
      const uid='sched-'+i+'-'+s.si;
      const sh=s.start_hour, eh=s.end_hour;
      if(sh==null)return;
      const freq=s.freq||'daily';
      const disabledCls=s.enabled===false?' disabled':'';
      schedDataMap[uid]={name:s.name,schedHuman:s.schedule_human||s.schedule,prompt:s.prompt};

      // Short name for label (truncate to avoid overlap)
      const shortName=s.name.length>12?s.name.substring(0,11)+'…':s.name;

      if(eh!=null && eh!==sh){
        const leftPct=hourToPercent(sh), rightPct=hourToPercent(eh);
        const midPct=(leftPct+rightPct)/2;
        dotsHtml+=`<div class="tl-range${disabledCls}" style="left:${leftPct}%;width:${rightPct-leftPct}%"></div>`;
        dotsHtml+=`<div class="tl-range-dot${disabledCls}" data-uid="${uid}" style="left:${leftPct}%" onclick="toggleSched('${uid}')"><div class="tl-tooltip">${esc(s.name)}<br>${esc(s.schedule_human||s.schedule)}</div></div>`;
        // Label below range — always show, centered
        dotsHtml+=`<div class="tl-label" style="left:${midPct}%">${esc(shortName)}</div>`;
        lastLabelEnd=midPct+4;
      } else {
        const pct=hourToPercent(sh);
        dotsHtml+=`<div class="tl-dot ${freq}${disabledCls}" data-uid="${uid}" style="left:${pct}%" onclick="toggleSched('${uid}')"><div class="tl-tooltip">${esc(s.name)}<br>${esc(s.schedule_human||s.schedule)}</div></div>`;
        // Only show label if not overlapping with previous
        if(pct-lastLabelEnd>3){
          dotsHtml+=`<div class="tl-label" style="left:${pct}%">${esc(shortName)}</div>`;
          lastLabelEnd=pct+4;
        }
      }
    });

    html+=`<div class="tl-lane">
      <div class="tl-lane-label"><span class="agent-badge ${aBadgeCls}" style="font-size:11px;padding:1px 6px">${esc(aName)}</span></div>
      <div class="tl-axis">${ticksHtml}<div class="tl-track"></div>${dotsHtml}</div>
    </div>`;
  });

  html+=`<div class="tl-legend">
    <div class="tl-legend-item"><div class="tl-legend-dot daily"></div>每天</div>
    <div class="tl-legend-item"><div class="tl-legend-dot weekday"></div>工作日</div>
    <div class="tl-legend-item"><div class="tl-legend-dot weekly"></div>每周</div>
    <div class="tl-legend-item"><div class="tl-legend-dot periodic"></div>周期</div>
    <div class="tl-legend-item" style="margin-left:auto;color:var(--dim)">点击查看 Prompt</div>
  </div>`;

  container.innerHTML=html;
  // Restore active highlight
  if(expandedScheds.size){
    const uid=[...expandedScheds][0];
    const dot=document.querySelector(`[data-uid="${uid}"]`);
    if(dot)dot.classList.add('tl-dot-active');
  }
}

let currentTab='home';
let knownTabs=[];  // [{agent_id, agent_idx, ...tab_config}]
let agentIdMap={};  // idx -> agent_id

function switchTab(tabId){
  currentTab=tabId;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tabId));
  const home=document.getElementById('homeContent');
  const tc=document.getElementById('tabContent');
  if(tabId==='home'){home.style.display='';tc.style.display='none';return;}
  home.style.display='none';tc.style.display='';
  tc.innerHTML='<div class="tab-loading">Loading...</div>';
  const tab=knownTabs.find(t=>t._uid===tabId);
  if(!tab){tc.innerHTML='<div class="tab-error">Tab not found</div>';return;}
  fetchTabData(tab);
}

async function fetchTabData(tab){
  const tc=document.getElementById('tabContent');
  try{
    const r=await fetch(`/api/tab/${tab.agent_id}/${tab.id}`);
    if(r.status===401){window.location='/dashboard/login';return;}
    const data=await r.json();
    if(data.error){tc.innerHTML=`<div class="card"><div class="tab-error">${esc(data.error)}</div></div>`;return;}
    let html=`<div class="card"><h2>${esc(tab.label)} <button class="tab-refresh-btn" onclick="fetchTabData(knownTabs.find(t=>t._uid==='${tab._uid}'))">Refresh</button></h2>`;
    if(data.html!=null)html+=renderTabHtml(data.html);
    else if(data.chart_type)html+=renderTabChart(data,tab._uid);
    else if(data.template==='table')html+=renderTabTable(data.data);
    else if(data.template==='key-value')html+=renderTabKV(data.data);
    else html+=`<div class="tab-error">Unknown template</div>`;
    html+='</div>';
    tc.innerHTML=html;
    // If chart, draw it after DOM update
    if(data.chart_type)requestAnimationFrame(()=>drawChart(tab._uid,data));
  }catch(e){tc.innerHTML=`<div class="card"><div class="tab-error">Network error</div></div>`;}
}

function renderTabTable(data){
  if(!Array.isArray(data)||!data.length)return'<div class="dim">No data</div>';
  const keys=Object.keys(data[0]);
  let h='<table class="tab-table"><thead><tr>';
  keys.forEach(k=>{h+=`<th>${esc(k)}</th>`;});
  h+='</tr></thead><tbody>';
  data.forEach(row=>{h+='<tr>';keys.forEach(k=>{h+=`<td>${esc(String(row[k]!=null?row[k]:''))}</td>`;});h+='</tr>';});
  h+='</tbody></table>';return h;
}

function renderTabKV(data,indent){
  if(!data||typeof data!=='object')return`<div class="dim">${esc(String(data))}</div>`;
  const cls=indent?'tab-kv tab-kv-nested':'tab-kv';
  let h=`<div class="${cls}">`;
  Object.entries(data).forEach(([k,v])=>{
    if(v&&typeof v==='object'&&!Array.isArray(v)){
      h+=`<div class="tab-kv-row"><span class="tab-kv-key">${esc(k)}</span></div>`;
      h+=renderTabKV(v,true);
    }else{
      h+=`<div class="tab-kv-row"><span class="tab-kv-key">${esc(k)}</span><span class="tab-kv-val">${esc(String(v!=null?v:''))}</span></div>`;
    }
  });
  h+='</div>';return h;
}

function renderTabHtml(html){
  return`<iframe srcdoc="${html.replace(/"/g,'&quot;')}" sandbox="allow-scripts" style="width:100%;height:500px;border:none;border-radius:6px;background:#fff"></iframe>`;
}

function renderTabChart(data,uid){
  return`<div class="tab-chart-wrap"><canvas id="chart-${uid}" width="800" height="300"></canvas></div>`;
}

function drawChart(uid,data){
  const canvas=document.getElementById('chart-'+uid);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=300*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height='300px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=300;
  const pad={top:40,right:20,bottom:40,left:55};
  const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  const labels=data.labels||[];
  const datasets=data.datasets||[];
  const isBar=data.chart_type==='bar';

  // Find min/max
  let allVals=[];datasets.forEach(ds=>(ds.data||[]).forEach(v=>allVals.push(v)));
  let minV=Math.min(0,...allVals),maxV=Math.max(1,...allVals);
  const range=maxV-minV||1;
  const niceStep=Math.pow(10,Math.floor(Math.log10(range)))||1;
  minV=Math.floor(minV/niceStep)*niceStep;
  maxV=Math.ceil(maxV/niceStep)*niceStep;
  const yRange=maxV-minV||1;

  const toX=i=>pad.left+(i/(Math.max(1,labels.length-1)))*cW;
  const toY=v=>pad.top+cH-(((v-minV)/yRange)*cH);

  // Background
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  const gridSteps=5;
  for(let i=0;i<=gridSteps;i++){
    const y=pad.top+(cH/gridSteps)*i;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    const val=maxV-((maxV-minV)/gridSteps)*i;
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px SF Mono,monospace';ctx.textAlign='right';
    ctx.fillText(val%1===0?String(val):val.toFixed(1),pad.left-6,y+3);
  }

  // X-axis labels
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.textAlign='center';ctx.font='10px SF Mono,monospace';
  const skipX=Math.ceil(labels.length/12);
  labels.forEach((l,i)=>{if(i%skipX===0){ctx.fillText(l,toX(i),H-pad.bottom+16);}});

  // Title
  if(data.title){ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(data.title,W/2,20);}

  // Datasets
  const barGroupW=cW/Math.max(1,labels.length);
  const barW=barGroupW/(datasets.length+1);
  datasets.forEach((ds,di)=>{
    const color=ds.color||['#4ade80','#60a5fa','#fb923c','#c084fc','#22d3ee'][di%5];
    const vals=ds.data||[];
    if(isBar){
      ctx.fillStyle=color+'99';
      vals.forEach((v,i)=>{
        const x=toX(i)-barGroupW/2+barW*di+barW*0.15;
        const y=toY(v);const bh=toY(minV)-y;
        ctx.fillRect(x,y,barW*0.7,bh);
      });
    }else{
      // Line
      ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
      vals.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
      // Dots
      ctx.fillStyle=color;
      vals.forEach((v,i)=>{const x=toX(i),y=toY(v);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
    }
  });

  // Legend
  if(datasets.length>1){
    let lx=pad.left;const ly=H-8;
    datasets.forEach((ds,di)=>{
      const color=ds.color||['#4ade80','#60a5fa','#fb923c','#c084fc','#22d3ee'][di%5];
      ctx.fillStyle=color;ctx.fillRect(lx,ly-6,10,6);
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px Inter,sans-serif';ctx.textAlign='left';
      ctx.fillText(ds.label||'Series '+(di+1),lx+14,ly);
      lx+=ctx.measureText(ds.label||'Series '+(di+1)).width+24;
    });
  }
}

function updateTabBar(allTabs, agents, agentNames){
  // Build flat list with agent info
  const newTabs=[];
  (allTabs||[]).forEach((agentTabs,i)=>{
    const aid=Object.keys(agentNames||{})[i]||'';
    (agentTabs||[]).forEach(t=>{
      newTabs.push({...t, agent_id:aid, agent_idx:i, _uid:'tab-'+aid+'-'+t.id});
    });
  });

  // Check if tabs changed
  const newIds=newTabs.map(t=>t._uid).join(',');
  const oldIds=knownTabs.map(t=>t._uid).join(',');
  if(newIds===oldIds)return;
  knownTabs=newTabs;

  // Rebuild tab bar
  const bar=document.getElementById('tabBar');
  bar.innerHTML='<button class="tab-btn'+(currentTab==='home'?' active':'')+'" data-tab="home" onclick="switchTab(\'home\')">&#127968; Home</button>';

  // Group by agent
  const agentKeys=Object.keys(agentNames||{});
  const multiAgent = agentKeys.length > 1;
  const agentsWithTabs = agentKeys.filter((aid,i) => (allTabs[i]||[]).length > 0);

  agentsWithTabs.forEach(aid => {
    const i = agentKeys.indexOf(aid);
    const agentTabsList = newTabs.filter(t => t.agent_id === aid);
    if(agentTabsList.length === 0) return;

    // Agent separator (only if multiple agents have tabs)
    if(multiAgent && agentsWithTabs.length > 1) {
      const aName = agentNames[aid] || aid;
      const dotColor = AGENT_DOT_COLORS[i] || AGENT_DOT_COLORS[0];
      bar.innerHTML += `<span class="tab-agent-sep"><span class="tab-dot" style="background:${dotColor}"></span>${esc(aName)}</span>`;
    }

    // Agent's tabs
    agentTabsList.forEach(t => {
      const dotColor = !multiAgent ? '' : AGENT_DOT_COLORS[t.agent_idx]||AGENT_DOT_COLORS[0];
      const dotHtml = (multiAgent && agentsWithTabs.length <= 1) ?
        `<span class="tab-dot" style="background:${dotColor}"></span>` : '';
      bar.innerHTML += `<button class="tab-btn${currentTab===t._uid?' active':''}" data-tab="${t._uid}" onclick="switchTab('${t._uid}')">${dotHtml}${esc(t.label)}</button>`;
    });
  });

  // If current tab was removed, switch to home
  if(currentTab!=='home'&&!newTabs.find(t=>t._uid===currentTab)){switchTab('home');}
}

function spawnDecor(){
  const aq=document.getElementById('aquarium');
  [15,30,50,70,85].forEach((l,i)=>{const r=document.createElement('div');r.className='ray';r.style.cssText=`left:${l}%;transform:rotate(${10+i*5}deg);animation-delay:${i*1.5}s;height:${150+Math.random()*100}px;`;aq.appendChild(r);});
  for(let i=0;i<10;i++){const b=document.createElement('div');b.className='bubble';const sz=2+Math.random()*6;b.style.cssText=`width:${sz}px;height:${sz}px;left:${5+Math.random()*90}%;bottom:${Math.random()*50}px;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*12}s;`;aq.appendChild(b);}
  [1,3,5,7,93,95,97,99].forEach(left=>{for(let j=0;j<2;j++){const w=document.createElement('div');w.className='weed';w.style.cssText=`left:${left+Math.random()*2-1}%;height:${40+Math.random()*50}px;animation-delay:${-Math.random()*3}s;`;aq.appendChild(w);}});
  ['🪸','🐚'].forEach((c,i)=>{const el=document.createElement('div');el.className='coral';el.textContent=c;el.style.left=[2,97][i]+'%';aq.appendChild(el);});
}

async function poll(){
  try{const r=await fetch('/api/status');if(r.status===401){window.location='/dashboard/login';return;}updateUI(await r.json());}
  catch{const l=document.getElementById('label-0');if(l)l.textContent='连接断开';}
}

spawnDecor();poll();setInterval(poll,1000);
</script>
